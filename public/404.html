<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Não Encontrada | Tradepar</title>
  <meta name="description" content="A página que você está procurando não foi encontrada. Volte para a página inicial do Tradepar.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .logo {
      height: 32px;
      width: auto;
    }
    
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .error-container {
      text-align: center;
      max-width: 500px;
    }
    
    .error-code {
      font-size: 8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
    }
    
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #fafafa;
    }
    
    .error-message {
      color: #a1a1aa;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: #0a0a0a;
      font-weight: 600;
      font-size: 0.875rem;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
    }
    
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
    }
    
    footer {
      padding: 1.5rem 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    
    .footer-text {
      color: #71717a;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    
    .footer-links a {
      color: #a1a1aa;
      font-size: 0.875rem;
      text-decoration: none;
      transition: color 0.2s ease;
    }
    
    .footer-links a:hover {
      color: #22c55e;
    }
    
    @media (max-width: 640px) {
      .error-code {
        font-size: 5rem;
      }
      
      .error-title {
        font-size: 1.25rem;
      }
      
      .footer-links {
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="/">
      <img src="/favicon.png" alt="Tradepar" class="logo">
    </a>
  </header>
  
  <main>
    <div class="error-container">
      <div class="error-code">404</div>
      <h1 class="error-title">Página Não Encontrada</h1>
      <p class="error-message">
        A página que você está procurando pode ter sido movida, excluída ou nunca existiu. 
        Verifique o endereço digitado ou volte para a página inicial.
      </p>
      <a href="/" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Voltar ao Início
      </a>
    </div>
  </main>
  
  <footer>
    <p class="footer-text">© 2026 Tradepar. Todos os direitos reservados.</p>
    <div class="footer-links">
      <a href="/corretoras">Corretoras</a>
      <a href="/blog">Blog</a>
      <a href="/contato">Contato</a>
      <a href="/termos-de-uso">Termos de Uso</a>
      <a href="/politica-privacidade">Privacidade</a>
    </div>
  </footer>
</body>
</html>
