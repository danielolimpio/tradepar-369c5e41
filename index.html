<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Tradepar - Portal Definitivo de Forex & Trading</title>
    <meta name="description" content="O portal de referência em forex: rankings de corretoras verificadas, estratégias profissionais, tecnologia MT4/MT5 e guia completo de segurança para traders." />
    <meta name="author" content="Tradepar" />
    <meta name="robots" content="index, follow" />
    
    <!-- Favicons -->

    <!-- Open Graph / Twitter são definidos por rota -->
    
    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

        "name": "Tradepar",
        "url": "https://tradepar.com.br",
        "logo": {
          "@type": "ImageObject",
          "url": "https://tradepar.com.br/favicon.png"
        }
      }
    }
    </script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
