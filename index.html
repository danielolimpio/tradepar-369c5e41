<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Tradepar - Portal Definitivo de Forex & Trading</title>
    <meta name="description" content="O portal de referência em forex: rankings de corretoras verificadas, estratégias profissionais, tecnologia MT4/MT5 e guia completo de segurança para traders." />
    <meta name="keywords" content="forex, trading, corretoras, MT4, MT5, estratégias, automação, EA, Expert Advisor, análise técnica, mercado financeiro" />
    <meta name="author" content="Tradepar" />
    <link rel="canonical" href="https://tradepar.com.br/" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tradepar.com.br/" />
    <meta property="og:title" content="Tradepar - Portal Definitivo de Forex & Trading" />
    <meta property="og:description" content="Rankings de corretoras, estratégias profissionais e tecnologia para traders de todos os níveis" />
    <meta property="og:image" content="https://tradepar.com.br/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Tradepar" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Tradepar" />
    <meta name="twitter:title" content="Tradepar - Portal Definitivo de Forex & Trading" />
    <meta name="twitter:description" content="Rankings de corretoras, estratégias profissionais e tecnologia para traders de todos os níveis" />
    <meta name="twitter:image" content="https://tradepar.com.br/og-image.jpg" />
    
    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Tradepar",
      "url": "https://tradepar.com.br",
      "description": "Portal de referência em forex com rankings de corretoras verificadas, estratégias profissionais e tecnologia de ponta",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://tradepar.com.br/busca?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Tradepar",
        "url": "https://tradepar.com.br",
        "logo": {
          "@type": "ImageObject",
          "url": "https://tradepar.com.br/favicon.png"
        }
      }
    }
    </script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
