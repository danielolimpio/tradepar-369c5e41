name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Instalar Puppeteer
        run: npm install puppeteer

      - name: Pré-renderização estática (SSG)
        run: node scripts/prerender.js

      - name: Garantir arquivos estáticos obrigatórios
        run: |
          cp public/.htaccess dist/.htaccess
          cp public/404.html dist/404.html
          echo "=== Verificando .htaccess e assets ==="
          test -f dist/.htaccess
          test -f dist/404.html
          test -d dist/assets
          test "$(find dist/assets -type f | wc -l)" -gt 0
          ls -la dist/.htaccess dist/404.html
          echo "Assets gerados: $(find dist/assets -type f | wc -l)"

      - name: Mostrar arquivos gerados
        run: |
          echo "=== Arquivos HTML gerados ==="
          ls -la dist/*.html || true
          echo "=== Total de arquivos ==="
          ls -la dist/ || true
          echo "=== Verificando títulos únicos (amostra) ==="
          for f in dist/tecnologia.html dist/estrategias.html dist/corretoras.html dist/api.html dist/comunidade.html; do
            [ -f "$f" ] && echo "$f -> $(grep -oE '<title>[^<]*</title>' "$f" | head -1)"
          done

      - name: Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy FTP para Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: 21
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -e "
          set ssl:verify-certificate no;
          set net:max-retries 2;
          set net:timeout 20;
          open -u $FTP_USER,$FTP_PASS -p $FTP_PORT $FTP_HOST;
          lcd dist;
          mirror --reverse --delete --verbose --ignore-time --parallel=2 ./ /;
          bye
          "
